<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Riyass Agent — Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E1A; --surface:#121826; --surface-2:#1A2236; --line:#252E44;
    --gold:#D4AF37; --gold-soft:#F0D888; --teal:#2DD4BF; --red:#FF5C5C;
    --text:#F5F1E8; --muted:#8B92A8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:radial-gradient(circle at 50% -10%, rgba(212,175,55,.10), transparent 45%), var(--bg);
    color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding:20px 16px 40px;
  }
  h1{font-family:'Fraunces',serif; font-size:20px; margin:0 0 4px;}
  .sub{color:var(--muted); font-size:12.5px; margin-bottom:18px;}
  .user-card{
    display:flex; align-items:center; gap:12px; background:var(--surface);
    border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:18px;
  }
  .avatar{
    width:40px;height:40px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold),#8a6d1f);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color:#151A28; flex-shrink:0;
  }
  .crown{font-size:11px; color:var(--gold); letter-spacing:.1em; font-family:'JetBrains Mono',monospace;}

  .section-title{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--gold); margin:22px 0 10px;
  }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:12px;
  }
  .row{display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;}
  .row .k{color:var(--muted);}
  .row .v{font-family:'JetBrains Mono',monospace; color:var(--text); text-align:right;}
  .id-pill{
    display:inline-block; font-family:'JetBrains Mono',monospace; font-size:11px;
    background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
    padding:2px 8px; color:var(--gold-soft); margin-bottom:8px;
  }
  .btns{display:flex; gap:8px; margin-top:12px;}
  .btn{
    flex:1; border:none; border-radius:10px; padding:11px 0; font-weight:700; font-size:13px; cursor:pointer;
  }
  .btn.accept{background:linear-gradient(135deg,var(--gold-soft),var(--gold)); color:#151A28;}
  .btn.reject{background:var(--surface-2); border:1px solid var(--red); color:var(--red);}
  .btn:disabled{opacity:.5;}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:20px 0;}
</style>
</head>
<body>
  <div class="user-card">
    <div class="avatar" id="avatarInit">A</div>
    <div>
      <div class="crown">👑 ADMIN PANEL</div>
      <div id="adminName" style="font-weight:600; font-size:14px;">Manager</div>
    </div>
  </div>

  <h1>Pending Requests</h1>
  <div class="sub">Tap accept or reject — the bot updates instantly.</div>

  <div class="section-title">Buy Requests</div>
  <div id="buyList"></div>

  <div class="section-title">Payout Requests</div>
  <div id="payoutList"></div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
  const name = u ? [u.first_name, u.last_name].filter(Boolean).join(' ') : 'Manager';
  document.getElementById('adminName').textContent = name;
  document.getElementById('avatarInit').textContent = name.charAt(0).toUpperCase() || 'A';

  // Bot passes the current pending lists as JSON in the "data" query param
  // each time it opens this app, so no backend/API call is needed.
  const params = new URLSearchParams(location.search);
  let payload = { buys: [], payouts: [] };
  try { payload = JSON.parse(decodeURIComponent(params.get('data') || '{}')); } catch(e) {}

  function card(html){ const d = document.createElement('div'); d.className='card'; d.innerHTML = html; return d; }

  function renderBuys(){
    const box = document.getElementById('buyList');
    box.innerHTML = '';
    if (!payload.buys || !payload.buys.length){ box.appendChild(Object.assign(document.createElement('div'),{className:'empty',textContent:'No pending buy requests.'})); return; }
    payload.buys.forEach(b => {
      const c = card(`
        <div class="id-pill">#${b.id.slice(0,8)}</div>
        <div class="row"><span class="k">User</span><span class="v">${b.uid}</span></div>
        <div class="row"><span class="k">Account</span><span class="v">${b.type} — ${b.size}</span></div>
        <div class="row"><span class="k">Price</span><span class="v">${b.price}</span></div>
        <div class="btns">
          <button class="btn accept">Accept</button>
          <button class="btn reject">Reject</button>
        </div>
      `);
      c.querySelector('.accept').onclick = () => send({action:'buy_accept', order:b.id, uid:b.uid}, c);
      c.querySelector('.reject').onclick = () => send({action:'buy_reject', order:b.id, uid:b.uid}, c);
      box.appendChild(c);
    });
  }

  function renderPayouts(){
    const box = document.getElementById('payoutList');
    box.innerHTML = '';
    if (!payload.payouts || !payload.payouts.length){ box.appendChild(Object.assign(document.createElement('div'),{className:'empty',textContent:'No pending payouts.'})); return; }
    payload.payouts.forEach(p => {
      const c = card(`
        <div class="id-pill">#${p.id.slice(0,8)}</div>
        <div class="row"><span class="k">User</span><span class="v">${p.uid}</span></div>
        <div class="row"><span class="k">Method</span><span class="v">${p.method}</span></div>
        <div class="row"><span class="k">Amount</span><span class="v">${p.amount}</span></div>
        <div class="btns">
          <button class="btn accept">Accept</button>
          <button class="btn reject">Reject</button>
        </div>
      `);
      c.querySelector('.accept').onclick = () => send({action:'payout_accept', order:p.id, uid:p.uid}, c);
      c.querySelector('.reject').onclick = () => send({action:'payout_reject', order:p.id, uid:p.uid}, c);
      box.appendChild(c);
    });
  }

  function send(obj, cardEl){
    cardEl.querySelectorAll('.btn').forEach(b => b.disabled = true);
    if (tg){ tg.sendData(JSON.stringify(obj)); setTimeout(()=>tg.close(), 400); }
    else { alert('Open inside Telegram to send actions.'); }
  }

  renderBuys(); renderPayouts();
</script>
</body>
</html>
