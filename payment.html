<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Riyass Agent — Payment</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E1A;
    --surface:#121826;
    --surface-2:#1A2236;
    --line:#252E44;
    --gold:#D4AF37;
    --gold-soft:#F0D888;
    --teal:#2DD4BF;
    --red:#FF5C5C;
    --text:#F5F1E8;
    --muted:#8B92A8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 50% -10%, rgba(212,175,55,0.10), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:20px 16px 100px;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
  }
  h1,h2{font-family:'Fraunces',serif; margin:0; font-weight:600;}

  /* ── User header ── */
  .user-card{
    display:flex; align-items:center; gap:12px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:16px;
  }
  .avatar{
    width:44px;height:44px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold),#8a6d1f);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; font-size:18px; color:#151A28;
    flex-shrink:0;
  }
  .user-meta .name{font-weight:600; font-size:15px;}
  .user-meta .uid{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); margin-top:2px;}

  /* ── Plan card ── */
  .plan-card{
    background:linear-gradient(180deg,var(--surface-2),var(--surface));
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
  }
  .plan-card .eyebrow{margin-bottom:6px;}
  .plan-card h1{font-size:22px; color:var(--gold-soft);}
  .price-row{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);
  }
  .price-row .label{color:var(--muted); font-size:13px;}
  .price-row .value{font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600; color:var(--gold-soft);}

  /* ── Network tabs ── */
  .tabs{
    display:flex; gap:8px; margin-bottom:16px;
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:4px;
  }
  .tab{
    flex:1; text-align:center; padding:10px 0; border-radius:10px;
    font-size:13px; font-weight:600; color:var(--muted); cursor:pointer;
    transition:all .2s ease;
  }
  .tab.active{ background:var(--gold); color:#151A28; }

  /* ── QR card ── */
  .qr-card{
    background:var(--surface); border:1px solid var(--line); border-radius:20px;
    padding:22px; display:flex; flex-direction:column; align-items:center;
    margin-bottom:16px;
  }
  .qr-ring{
    width:200px; height:200px; border-radius:18px; padding:10px;
    background:var(--surface-2);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    box-shadow:0 0 0 2px var(--gold), 0 0 24px rgba(212,175,55,.25);
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 2px var(--gold), 0 0 20px rgba(212,175,55,.20); }
    50%{ box-shadow:0 0 0 2px var(--gold-soft), 0 0 32px rgba(212,175,55,.45); }
  }
  .qr-ring img{width:100%; height:100%; border-radius:8px; display:block;}
  .qr-status{font-size:12px; color:var(--muted); margin-top:12px; font-family:'JetBrains Mono',monospace;}
  .qr-status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin-right:6px; animation:blink 1.4s infinite;}
  @keyframes blink{50%{opacity:.25;}}

  /* ── Address ── */
  .addr-card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:20px;
  }
  .addr-label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px;}
  .addr-row{display:flex; align-items:center; gap:10px;}
  .addr-text{
    flex:1; font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--text);
    word-break:break-all; line-height:1.5;
  }
  .copy-btn{
    flex-shrink:0; background:var(--surface-2); border:1px solid var(--line); color:var(--gold-soft);
    border-radius:10px; padding:9px 12px; font-size:12px; font-weight:600; cursor:pointer;
  }
  .copy-btn.copied{background:var(--teal); color:#062821; border-color:var(--teal);}

  .warn{
    font-size:12.5px; color:var(--muted); text-align:center; margin-bottom:6px; line-height:1.6;
  }
  .warn b{color:var(--gold-soft);}

  /* ── Fixed CTA ── */
  .cta-bar{
    position:fixed; left:0; right:0; bottom:0;
    background:linear-gradient(180deg, rgba(10,14,26,0), var(--bg) 30%);
    padding:22px 16px 20px;
  }
  .cta{
    width:100%; border:none; border-radius:14px; padding:16px;
    background:linear-gradient(135deg,var(--gold-soft),var(--gold));
    color:#151A28; font-weight:700; font-size:15px; font-family:'Inter',sans-serif;
    cursor:pointer;
  }
  .cta:active{transform:scale(.98);}
  .cta.sent{background:var(--teal); color:#062821;}
</style>
</head>
<body>

  <div class="user-card">
    <div class="avatar" id="avatarInit">?</div>
    <div class="user-meta">
      <div class="name" id="userName">Member</div>
      <div class="uid" id="userId">ID: —</div>
    </div>
  </div>

  <div class="plan-card">
    <div class="eyebrow" id="planLabel">FUNDED ACCOUNT</div>
    <h1 id="planSize">—</h1>
    <div class="price-row">
      <span class="label">Amount Due</span>
      <span class="value" id="planPrice">— USDT</span>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-net="trc20">TRC20</div>
    <div class="tab" data-net="erc20">ERC20</div>
    <div class="tab" data-net="bep20">BEP20</div>
  </div>

  <div class="qr-card">
    <div class="qr-ring"><img id="qrImg" alt="QR code"></div>
    <div class="qr-status"><span class="dot"></span>Waiting for payment</div>
  </div>

  <div class="addr-card">
    <div class="addr-label">Deposit Address</div>
    <div class="addr-row">
      <div class="addr-text" id="addrText">—</div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
  </div>

  <p class="warn">Send exactly <b id="warnPrice">—</b> on the selected network only.<br>Sending on the wrong network may result in loss of funds.</p>

  <div class="cta-bar">
    <button class="cta" id="ctaBtn">I've Sent The Payment</button>
  </div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const params = new URLSearchParams(location.search);
  const data = {
    order:  params.get('order')  || '',
    label:  params.get('type')   || 'FUNDED ACCOUNT',
    size:   params.get('size')   || '—',
    price:  params.get('price')  || '—',
    trc20:  params.get('trc20')  || '',
    erc20:  params.get('erc20')  || '',
    bep20:  params.get('bep20')  || '',
  };

  document.getElementById('planLabel').textContent = data.label.toUpperCase();
  document.getElementById('planSize').textContent   = data.size;
  document.getElementById('planPrice').textContent  = data.price;
  document.getElementById('warnPrice').textContent  = data.price;

  // Personalize from Telegram's own user data — no backend call needed
  const u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
  const displayName = u ? [u.first_name, u.last_name].filter(Boolean).join(' ') : 'Member';
  document.getElementById('userName').textContent = displayName;
  document.getElementById('userId').textContent = 'ID: ' + (u ? u.id : '—');
  document.getElementById('avatarInit').textContent = displayName.charAt(0).toUpperCase() || 'M';

  const addrByNet = { trc20: data.trc20, erc20: data.erc20, bep20: data.bep20 };
  let currentNet = 'trc20';

  function renderNetwork(net){
    currentNet = net;
    const addr = addrByNet[net] || 'Not configured';
    document.getElementById('addrText').textContent = addr;
    document.getElementById('qrImg').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=360x360&color=151A28&bgcolor=FFFFFF&data=' + encodeURIComponent(addr);
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.net === net));
  }
  document.getElementById('tabs').addEventListener('click', (e) => {
    const t = e.target.closest('.tab');
    if (t) renderNetwork(t.dataset.net);
  });
  renderNetwork('trc20');

  document.getElementById('copyBtn').addEventListener('click', () => {
    const addr = addrByNet[currentNet];
    navigator.clipboard && navigator.clipboard.writeText(addr).catch(()=>{});
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });

  document.getElementById('ctaBtn').addEventListener('click', () => {
    const btn = document.getElementById('ctaBtn');
    btn.textContent = 'Verifying…'; btn.classList.add('sent'); btn.disabled = true;
    const payload = { action: 'payment_sent', order: data.order, network: currentNet };
    if (tg) {
      tg.sendData(JSON.stringify(payload));
      setTimeout(() => tg.close(), 600);
    } else {
      alert('Open this page inside Telegram to submit payment.');
    }
  });
</script>
</body>
</html>
